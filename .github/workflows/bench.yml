name: Benchmarks

on:
  pull_request:
    branches: [main]
    paths:
      - 'crates/**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/bench.yml'
  push:
    branches: [main]
    paths:
      - 'crates/**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/bench.yml'

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  pull-requests: write
  deployments: write

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Performance regression check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: bench

      - name: Run benchmarks
        # Only run the `analysis` bench target (not `large_analysis` which
        # contains 5000+ file benchmarks that take 5+ minutes each).
        run: cargo bench --bench analysis -- --output-format bencher | tee bench-output.txt

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        with:
          name: Fallow Benchmarks
          tool: 'cargo'
          output-file-path: bench-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Store results in gh-pages branch
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          # Comment on PRs with benchmark comparison
          comment-on-alert: true
          comment-always: ${{ github.event_name == 'pull_request' }}
          # Alert if performance regresses by more than 10%
          alert-threshold: '110%'
          fail-on-alert: false
          # Compare against previous results
          save-data-file: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench

      - name: Deploy dashboard
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Save the dashboard page before switching branches
          cp .github/pages/index.html /tmp/dashboard-index.html

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Fetch latest gh-pages (benchmark-action may have just pushed)
          git fetch origin gh-pages

          # Use worktree to avoid losing the main checkout
          git worktree add /tmp/gh-pages origin/gh-pages
          cd /tmp/gh-pages

          cp /tmp/dashboard-index.html index.html
          git add index.html
          if ! git diff --cached --quiet; then
            git commit -m "chore: update dashboard index.html"
            git push origin HEAD:gh-pages
          fi

          cd "$GITHUB_WORKSPACE"
          git worktree remove /tmp/gh-pages
