name: Conformance

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  conformance:
    name: Fallow vs Knip
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      - name: Build fallow
        run: cargo build --release -p fallow-cli

      - name: Run conformance suite
        id: conformance
        run: |
          REPORT="$(./tests/conformance/run.sh --fallow-bin ./target/release/fallow 2>conformance-stderr.txt)"
          echo "${REPORT}" > conformance-report.json

          # Validate report is valid JSON before extracting
          if ! python3 -c "import json; json.load(open('conformance-report.json'))" 2>/dev/null; then
            echo "::warning::Conformance report is not valid JSON"
            exit 1
          fi

          # Extract summary values for the step summary
          FALLOW_TOTAL="$(echo "${REPORT}" | python3 -c "import json,sys; print(json.load(sys.stdin)['summary']['fallow_total'])")"
          KNIP_TOTAL="$(echo "${REPORT}" | python3 -c "import json,sys; print(json.load(sys.stdin)['summary']['knip_total'])")"
          AGREED="$(echo "${REPORT}" | python3 -c "import json,sys; print(json.load(sys.stdin)['summary']['agreed'])")"
          FALLOW_ONLY="$(echo "${REPORT}" | python3 -c "import json,sys; print(json.load(sys.stdin)['summary']['fallow_only'])")"
          KNIP_ONLY="$(echo "${REPORT}" | python3 -c "import json,sys; print(json.load(sys.stdin)['summary']['knip_only'])")"
          AGREEMENT_PCT="$(echo "${REPORT}" | python3 -c "import json,sys; print(json.load(sys.stdin)['summary']['agreement_pct'])")"

          echo "fallow_total=${FALLOW_TOTAL}" >> "$GITHUB_OUTPUT"
          echo "knip_total=${KNIP_TOTAL}" >> "$GITHUB_OUTPUT"
          echo "agreed=${AGREED}" >> "$GITHUB_OUTPUT"
          echo "fallow_only=${FALLOW_ONLY}" >> "$GITHUB_OUTPUT"
          echo "knip_only=${KNIP_ONLY}" >> "$GITHUB_OUTPUT"
          echo "agreement_pct=${AGREEMENT_PCT}" >> "$GITHUB_OUTPUT"

          # Write custom JSON for benchmark-action tracking
          python3 -c "
          import json
          data = [
            {'name': 'Agreement Rate', 'unit': '%', 'value': float('${AGREEMENT_PCT:-0}')},
            {'name': 'Agreed Issues', 'unit': 'issues', 'value': int('${AGREED:-0}')},
            {'name': 'Fallow Total', 'unit': 'issues', 'value': int('${FALLOW_TOTAL:-0}')},
            {'name': 'Knip Total', 'unit': 'issues', 'value': int('${KNIP_TOTAL:-0}')}
          ]
          print(json.dumps(data, indent=2))
          " > conformance-bench.json
        # Never fail -- this is informational
        continue-on-error: true

      - name: Store conformance metrics
        if: always() && steps.conformance.outcome != 'skipped'
        uses: benchmark-action/github-action-benchmark@a7bc2366eda11037936ea57d811a43b3418d3073 # v1
        continue-on-error: true
        with:
          name: Fallow Conformance
          tool: 'customBiggerIsBetter'
          output-file-path: conformance-bench.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-on-alert: true
          alert-threshold: '95%'
          fail-on-alert: false
          save-data-file: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/conformance

      - name: Post step summary
        if: always()
        env:
          FALLOW_TOTAL: ${{ steps.conformance.outputs.fallow_total }}
          KNIP_TOTAL: ${{ steps.conformance.outputs.knip_total }}
          AGREED: ${{ steps.conformance.outputs.agreed }}
          FALLOW_ONLY: ${{ steps.conformance.outputs.fallow_only }}
          KNIP_ONLY: ${{ steps.conformance.outputs.knip_only }}
          AGREEMENT_PCT: ${{ steps.conformance.outputs.agreement_pct }}
        run: |
          # Check if report exists and contains valid JSON
          if [[ ! -f conformance-report.json ]] || ! python3 -c "import json; json.load(open('conformance-report.json'))" 2>/dev/null; then
            echo "## Conformance Test" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Conformance suite did not produce a valid report. Check the logs for errors." >> "$GITHUB_STEP_SUMMARY"
            if [[ -f conformance-stderr.txt ]]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              cat conformance-stderr.txt >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
            if [[ -f conformance-report.json ]]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "Raw report content:" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              head -5 conformance-report.json >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
            exit 0
          fi

          echo "## Conformance Test: Fallow vs Knip" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Fallow issues | ${FALLOW_TOTAL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Knip issues | ${KNIP_TOTAL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Agreed | ${AGREED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Fallow-only | ${FALLOW_ONLY} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Knip-only | ${KNIP_ONLY} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Agreement** | **${AGREEMENT_PCT}%** |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Add per-type breakdown
          echo "### By Issue Type" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python3 -c "
          import json
          with open('conformance-report.json') as f:
              r = json.load(f)
          print('| Type | Fallow | Knip | Agreed | Agreement |')
          print('|------|--------|------|--------|-----------|')
          for t, d in sorted(r['by_type'].items()):
              print(f\"| {t} | {d['fallow_count']} | {d['knip_count']} | {d['agreed']} | {d['agreement_pct']}% |\")
          " >> "$GITHUB_STEP_SUMMARY"

          # Add disagreement details
          python3 -c "
          import json
          with open('conformance-report.json') as f:
              r = json.load(f)
          details = r['details']
          if details['fallow_only']:
              print()
              print('### Fallow-only findings')
              print()
              print('Issues found by fallow but not by knip:')
              print()
              for d in details['fallow_only']:
                  name = f' (\`{d[\"name\"]}\`)' if d['name'] else ''
                  print(f'- \`{d[\"type\"]}\` in \`{d[\"file\"]}\`{name}')
          if details['knip_only']:
              print()
              print('### Knip-only findings')
              print()
              print('Issues found by knip but not by fallow:')
              print()
              for d in details['knip_only']:
                  name = f' (\`{d[\"name\"]}\`)' if d['name'] else ''
                  print(f'- \`{d[\"type\"]}\` in \`{d[\"file\"]}\`{name}')
          " >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: conformance-report
          path: |
            conformance-report.json
            conformance-stderr.txt
          retention-days: 30
