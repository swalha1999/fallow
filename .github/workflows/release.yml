name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: fallow
            npm_dir: darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: fallow
            npm_dir: darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: fallow
            npm_dir: linux-x64-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: fallow
            npm_dir: linux-arm64-gnu
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: fallow
            npm_dir: linux-x64-musl
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary: fallow
            npm_dir: linux-arm64-musl
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: fallow.exe
            npm_dir: win32-x64-msvc

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install aarch64 cross-compilation tools
        if: contains(matrix.target, 'aarch64-unknown-linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p fallow-cli
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../fallow-${{ matrix.target }}.tar.gz ${{ matrix.binary }}

      - name: Package binary (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../fallow-${{ matrix.target }}.zip ${{ matrix.binary }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: fallow-${{ matrix.target }}
          path: fallow-${{ matrix.target }}.*

      - name: Upload npm binary
        uses: actions/upload-artifact@v7
        with:
          name: npm-${{ matrix.npm_dir }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: fallow-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    name: Publish to npm
    needs: [build, release]
    runs-on: ubuntu-latest
    env:
      TAG_REF: ${{ github.ref }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Ensure latest npm (for trusted publishing)
        run: npm install -g npm@latest

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Download darwin-arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: npm-darwin-arm64
          path: npm/darwin-arm64

      - name: Download darwin-x64 binary
        uses: actions/download-artifact@v8
        with:
          name: npm-darwin-x64
          path: npm/darwin-x64

      - name: Download linux-x64-gnu binary
        uses: actions/download-artifact@v8
        with:
          name: npm-linux-x64-gnu
          path: npm/linux-x64-gnu

      - name: Download linux-arm64-gnu binary
        uses: actions/download-artifact@v8
        with:
          name: npm-linux-arm64-gnu
          path: npm/linux-arm64-gnu

      - name: Download linux-x64-musl binary
        uses: actions/download-artifact@v8
        with:
          name: npm-linux-x64-musl
          path: npm/linux-x64-musl

      - name: Download linux-arm64-musl binary
        uses: actions/download-artifact@v8
        with:
          name: npm-linux-arm64-musl
          path: npm/linux-arm64-musl

      - name: Download win32-x64-msvc binary
        uses: actions/download-artifact@v8
        with:
          name: npm-win32-x64-msvc
          path: npm/win32-x64-msvc

      - name: Set binary permissions
        run: |
          chmod +x npm/darwin-arm64/fallow
          chmod +x npm/darwin-x64/fallow
          chmod +x npm/linux-x64-gnu/fallow
          chmod +x npm/linux-arm64-gnu/fallow
          chmod +x npm/linux-x64-musl/fallow
          chmod +x npm/linux-arm64-musl/fallow

      - name: Update versions
        run: |
          VERSION="${TAG_REF#refs/tags/v}"
          for pkg in npm/*/package.json; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$pkg', 'utf8'));
              pkg.version = '$VERSION';
              if (pkg.optionalDependencies) {
                for (const key of Object.keys(pkg.optionalDependencies)) {
                  if (key.startsWith('@fallow-cli/')) {
                    pkg.optionalDependencies[key] = '$VERSION';
                  }
                }
              }
              fs.writeFileSync('$pkg', JSON.stringify(pkg, null, 2) + '\n');
            "
          done

      - name: Publish platform packages
        run: |
          FAILED=0
          for dir in ./npm/darwin-arm64 ./npm/darwin-x64 ./npm/linux-x64-gnu ./npm/linux-arm64-gnu ./npm/linux-x64-musl ./npm/linux-arm64-musl ./npm/win32-x64-msvc; do
            echo "Publishing $(basename "$dir")..."
            if ! npm publish "$dir" --access public --provenance; then
              echo "::error::Failed to publish $(basename "$dir")"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Publish fallow
        run: npm publish ./npm/fallow --access public --provenance --ignore-scripts
