name: Miri

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'crates/graph/**'
      - 'crates/extract/**'
      - 'crates/types/**'
      - '.github/workflows/miri.yml'
  push:
    branches: [main]
    paths:
      - 'crates/graph/**'
      - 'crates/extract/**'
      - 'crates/types/**'
      - '.github/workflows/miri.yml'

concurrency:
  group: miri-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  miri:
    name: Miri memory safety
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - uses: Swatinem/rust-cache@v2
        with:
          key: miri

      # Pure data structure tests — no file I/O, all tests run
      - name: fallow-types
        run: cargo +nightly miri test -p fallow-types

      # Graph construction and resolution tests — skip proptest (file I/O for
      # persisted failures is unsupported under Miri)
      - name: fallow-graph
        run: cargo +nightly miri test -p fallow-graph -- --skip proptests

      # AST extraction — only run suppress and unit tests. Skip cache (file I/O)
      # and all parser integration tests (js_ts, sfc, css, mdx, astro) because
      # Oxc parser under Miri is ~1000x slower than native, exceeding timeouts.
      # Miri's value here is checking our own data structures, not Oxc internals.
      - name: fallow-extract
        run: cargo +nightly miri test -p fallow-extract -- --skip cache --skip tests
