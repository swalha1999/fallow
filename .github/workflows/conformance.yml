name: Conformance

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  conformance:
    name: Fallow vs Knip
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-rust

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 9

      - name: Build fallow
        run: cargo build --release -p fallow-cli

      - name: Run conformance suite
        id: conformance
        run: |
          REPORT="$(./tests/conformance/run-all.sh \
            --fallow-bin ./target/release/fallow \
            --clone-dir /tmp/fallow-conformance \
            --timeout 300 \
            2>conformance-stderr.txt)"
          echo "${REPORT}" > conformance-report.json

          # Validate report is valid JSON before extracting
          if ! python3 -c "import json; json.load(open('conformance-report.json'))" 2>/dev/null; then
            echo "::warning::Conformance report is not valid JSON"
            exit 1
          fi

          # Extract summary values for the step summary
          python3 -c "
          import json
          with open('conformance-report.json') as f:
              r = json.load(f)
          s = r['summary']
          with open('$GITHUB_OUTPUT', 'a') as out:
              out.write(f\"fallow_total={s['fallow_total']}\n\")
              out.write(f\"knip_total={s['knip_total']}\n\")
              out.write(f\"agreed={s['agreed']}\n\")
              out.write(f\"fallow_only={s['fallow_only']}\n\")
              out.write(f\"knip_only={s['knip_only']}\n\")
              out.write(f\"agreement_pct={s['agreement_pct']}\n\")
          "

          # Write custom JSON for benchmark-action tracking
          # Per-project agreement rates + overall
          python3 -c "
          import json
          with open('conformance-report.json') as f:
              r = json.load(f)
          data = [
            {'name': 'Agreement Rate', 'unit': '%', 'value': float(r['summary']['agreement_pct'])},
            {'name': 'Agreed Issues', 'unit': 'issues', 'value': int(r['summary']['agreed'])},
            {'name': 'Fallow Total', 'unit': 'issues', 'value': int(r['summary']['fallow_total'])},
            {'name': 'Knip Total', 'unit': 'issues', 'value': int(r['summary']['knip_total'])},
          ]
          for name, proj in sorted(r.get('projects', {}).items()):
            data.append({'name': f'{name} Agreement', 'unit': '%', 'value': float(proj['agreement_pct'])})
          print(json.dumps(data, indent=2))
          " > conformance-bench.json
        # Never fail -- this is informational
        continue-on-error: true

      - name: Store conformance metrics
        if: always() && steps.conformance.outcome != 'skipped'
        uses: ./.github/actions/store-benchmark
        with:
          name: Fallow Conformance
          tool: customBiggerIsBetter
          output-file-path: conformance-bench.json
          data-dir: conformance
          alert-threshold: '115%'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          continue-on-error: 'true'

      - name: Post step summary
        if: always()
        env:
          FALLOW_TOTAL: ${{ steps.conformance.outputs.fallow_total }}
          KNIP_TOTAL: ${{ steps.conformance.outputs.knip_total }}
          AGREED: ${{ steps.conformance.outputs.agreed }}
          FALLOW_ONLY: ${{ steps.conformance.outputs.fallow_only }}
          KNIP_ONLY: ${{ steps.conformance.outputs.knip_only }}
          AGREEMENT_PCT: ${{ steps.conformance.outputs.agreement_pct }}
        run: |
          # Check if report exists and contains valid JSON
          if [[ ! -f conformance-report.json ]] || ! python3 -c "import json; json.load(open('conformance-report.json'))" 2>/dev/null; then
            echo "## Conformance Test" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Conformance suite did not produce a valid report. Check the logs for errors." >> "$GITHUB_STEP_SUMMARY"
            if [[ -f conformance-stderr.txt ]]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              cat conformance-stderr.txt >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
            exit 0
          fi

          echo "## Conformance Test: Fallow vs Knip" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Fallow issues | ${FALLOW_TOTAL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Knip issues | ${KNIP_TOTAL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Agreed | ${AGREED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Fallow-only | ${FALLOW_ONLY} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Knip-only | ${KNIP_ONLY} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Agreement** | **${AGREEMENT_PCT}%** |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Add per-project breakdown
          echo "### Per Project" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python3 -c "
          import json
          with open('conformance-report.json') as f:
              r = json.load(f)
          projects = r.get('projects', {})
          if projects:
              print('| Project | Fallow | Knip | Agreed | Agreement |')
              print('|---------|--------|------|--------|-----------|')
              for name, s in sorted(projects.items()):
                  print(f\"| {name} | {s['fallow_total']} | {s['knip_total']} | {s['agreed']} | {s['agreement_pct']}% |\")
          " >> "$GITHUB_STEP_SUMMARY"

          # Add per-type breakdown
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### By Issue Type" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python3 -c "
          import json
          with open('conformance-report.json') as f:
              r = json.load(f)
          print('| Type | Fallow | Knip | Agreed | Agreement |')
          print('|------|--------|------|--------|-----------|')
          for t, d in sorted(r['by_type'].items()):
              print(f\"| {t} | {d['fallow_count']} | {d['knip_count']} | {d['agreed']} | {d['agreement_pct']}% |\")
          " >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: conformance-report
          path: |
            conformance-report.json
            conformance-stderr.txt
          retention-days: 30
